<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub Cyber Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050510;
  color: white;
  overflow-x: hidden;
}

/* ================= PARTICLE BACKGROUND ================= */
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  background: radial-gradient(circle at top, #120a2a, #050510);
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #a855f7;
  border-radius: 50%;
  opacity: 0.6;
  animation: float 8s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 1; }
}

/* ================= HEADER ================= */
header {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: rgba(10, 10, 25, 0.6);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(168,85,247,0.3);
  z-index: 1000;
}

.logo {
  color: #a855f7;
  font-weight: bold;
}

/* ================= NAV ================= */
nav {
  display: flex;
  gap: 15px;
}

nav a {
  color: #cbd5e1;
  text-decoration: none;
  padding: 6px 10px;
  border-radius: 6px;
  transition: 0.3s;
}

nav a:hover {
  color: #3b82f6;
  text-shadow: 0 0 10px #3b82f6;
}

/* ================= HAMBURGER ================= */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  transition: 0.3s;
}

.hamburger div {
  width: 26px;
  height: 3px;
  background: #a855f7;
  border-radius: 5px;
  transition: 0.3s;
}

/* ANIMATED X */
.hamburger.active div:nth-child(1) {
  transform: rotate(45deg) translate(5px,5px);
}
.hamburger.active div:nth-child(2) {
  opacity: 0;
}
.hamburger.active div:nth-child(3) {
  transform: rotate(-45deg) translate(6px,-6px);
}

/* ================= SIDE MENU ================= */
.side-menu {
  position: fixed;
  top: 0;
  right: -280px;
  width: 280px;
  height: 100vh;
  background: #0b0b18;
  padding: 70px 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  transition: 0.4s;
  z-index: 2000;
  border-left: 1px solid rgba(168,85,247,0.3);
}

.side-menu a {
  color: white;
  text-decoration: none;
  padding: 10px;
  border-radius: 8px;
  background: rgba(168,85,247,0.1);
}

.side-menu a:hover {
  background: rgba(59,130,246,0.2);
}

/* ACTIVE */
.side-menu.active {
  right: 0;
}

/* BACKDROP */
.backdrop {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  z-index: 1500;
}

.backdrop.active {
  display: block;
}

/* ================= HERO ================= */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 65px;
  color: #a855f7;
  text-shadow: 0 0 20px rgba(168,85,247,0.6);
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #a855f7; }
  to { text-shadow: 0 0 30px #3b82f6; }
}

.hero p {
  max-width: 600px;
  opacity: 0.8;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 28px;
  background: linear-gradient(135deg, #3b82f6, #a855f7);
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* MOBILE */
@media(max-width:768px){
  nav { display:none; }
  .hamburger { display:flex; }
}
</style>
</head>

<body>

<!-- PARTICLES -->
<div id="particles"></div>

<!-- HEADER -->
<header>
  <div class="logo">🎮 GAME HUB</div>

  <nav>
    <a href="#">Home</a>
    <a href="#features">Features</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </nav>

  <div class="hamburger" onclick="toggleMenu(this)">
    <div></div>
    <div></div>
    <div></div>
  </div>
</header>

<!-- BACKDROP -->
<div class="backdrop" onclick="toggleMenu(document.querySelector('.hamburger'))"></div>

<!-- SIDE MENU -->
<div class="side-menu" id="menu">
  <a href="#" onclick="closeMenu()">Home</a>
  <a href="#features" onclick="closeMenu()">Features</a>
  <a href="#gallery" onclick="closeMenu()">Gallery</a>
  <a href="#contact" onclick="closeMenu()">Contact</a>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Game Hub Cyber Pro</h1>
  <p>Next generation gaming club with ultra performance PCs and esports environment.</p>
  <button class="btn">Book Now</button>
</section>

<script>

/* ================= MENU ================= */
function toggleMenu(el){
  el.classList.toggle("active");
  document.getElementById("menu").classList.toggle("active");
  document.querySelector(".backdrop").classList.toggle("active");
}

function closeMenu(){
  document.querySelector(".hamburger").classList.remove("active");
  document.getElementById("menu").classList.remove("active");
  document.querySelector(".backdrop").classList.remove("active");
}

/* ================= PARTICLES ================= */
const particles = document.getElementById("particles");

for(let i=0;i<40;i++){
  let p = document.createElement("div");
  p.classList.add("particle");
  p.style.left = Math.random()*100 + "vw";
  p.style.animationDuration = (3 + Math.random()*5) + "s";
  p.style.opacity = Math.random();
  particles.appendChild(p);
}

</script>

</body>
</html>
