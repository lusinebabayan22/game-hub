<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub Cyber Ultra</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap');

body {
  margin: 0;
  font-family: 'Orbitron', Arial;
  background: radial-gradient(circle at top, #120a2a, #050510);
  color: white;
  overflow-x: hidden;
}

/* ================= HEADER ================= */
header {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 30px;
  background: rgba(10,10,25,0.55);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(168,85,247,0.25);
  z-index: 1000;
}

.logo {
  font-weight: 800;
  color: #a855f7;
  letter-spacing: 2px;
  text-shadow: 0 0 15px rgba(168,85,247,0.6);
}

/* NAV */
nav {
  display: flex;
  gap: 18px;
}

nav a {
  color: #cbd5e1;
  text-decoration: none;
  font-size: 13px;
  padding: 6px 10px;
  border-radius: 8px;
  transition: 0.3s;
}

nav a:hover {
  background: rgba(59,130,246,0.15);
  color: #3b82f6;
  box-shadow: 0 0 10px rgba(59,130,246,0.3);
}

/* LANGUAGE */
.lang button {
  background: linear-gradient(135deg, #3b82f6, #a855f7);
  border: none;
  color: white;
  padding: 7px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 0 10px rgba(168,85,247,0.3);
}

/* ================= HERO ================= */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 64px;
  margin: 0;
  color: #a855f7;
  text-shadow: 0 0 25px rgba(168,85,247,0.7);
}

.hero p {
  max-width: 650px;
  opacity: 0.85;
  margin-top: 10px;
}

.btn {
  margin-top: 22px;
  padding: 13px 32px;
  background: linear-gradient(135deg, #3b82f6, #a855f7);
  border: none;
  border-radius: 12px;
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
  box-shadow: 0 0 20px rgba(168,85,247,0.2);
}

.btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 30px rgba(59,130,246,0.4);
}

/* ================= SECTIONS ================= */
section {
  padding: 90px 20px;
  text-align: center;
}

h2 {
  font-size: 28px;
  letter-spacing: 2px;
  color: #a855f7;
  margin-bottom: 30px;
}

/* ================= FEATURES ================= */
.features {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 16px;
}

.card {
  width: 210px;
  padding: 22px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(168,85,247,0.25);
  border-radius: 14px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  border-color: #3b82f6;
  box-shadow: 0 0 25px rgba(59,130,246,0.2);
}

/* ================= PACKAGES ================= */
.packages {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 18px;
}

.package {
  width: 240px;
  padding: 25px;
  background: linear-gradient(145deg, rgba(18,18,40,0.9), rgba(10,10,25,0.9));
  border: 1px solid rgba(168,85,247,0.3);
  border-radius: 16px;
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

.package::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(168,85,247,0.15), transparent 60%);
  transform: rotate(25deg);
}

.package:hover {
  transform: translateY(-10px) scale(1.02);
  border-color: #3b82f6;
  box-shadow: 0 0 35px rgba(168,85,247,0.25);
}

.price {
  font-size: 30px;
  color: #3b82f6;
  margin: 12px 0;
  font-weight: bold;
}

/* ================= FOOTER ================= */
footer {
  text-align: center;
  padding: 35px;
  opacity: 0.6;
}

/* MOBILE */
@media(max-width:768px){
  nav { display:none; }
}
</style>
</head>

<body>

<header>
  <div class="logo">GAME HUB</div>

  <nav>
    <a href="#features" id="m1">Features</a>
    <a href="#packages" id="m2">Packages</a>
    <a href="#contact" id="m3">Contact</a>
  </nav>

  <div class="lang">
    <button onclick="switchLang()">EN</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1 id="title">Cyber Gaming Hub</h1>
  <p id="desc">Ultra-premium esports center with next-gen RTX gaming systems.</p>
  <button class="btn" id="btn">Book Now</button>
</section>

<!-- FEATURES -->
<section id="features">
  <h2 id="ftitle">Features</h2>

  <div class="features">
    <div class="card" id="f1">RTX Gaming PCs</div>
    <div class="card" id="f2">1Gb Ultra Internet</div>
    <div class="card" id="f3">Pro Esports Arena</div>
    <div class="card" id="f4">24/7 Access</div>
  </div>
</section>

<!-- PACKAGES -->
<section id="packages">
  <h2 id="ptitle">Packages</h2>

  <div class="packages">
    <div class="package">
      <h3 id="p1">Basic</h3>
      <div class="price">$5/hr</div>
    </div>

    <div class="package">
      <h3 id="p2">Pro</h3>
      <div class="price">$10/hr</div>
    </div>

    <div class="package">
      <h3 id="p3">VIP</h3>
      <div class="price">$20/hr</div>
    </div>
  </div>
</section>

<footer id="footer">© 2026 Game Hub Cyber Ultra</footer>

<script>

let i = 0;
const langs = ["en","hy","ru"];

const t = {
en:{
title:"Cyber Gaming Hub",
desc:"Ultra-premium esports center with next-gen RTX gaming systems.",
btn:"Book Now",
ftitle:"Features",
ptitle:"Packages",
f1:"RTX Gaming PCs",
f2:"1Gb Ultra Internet",
f3:"Pro Esports Arena",
f4:"24/7 Access",
p1:"Basic",p2:"Pro",p3:"VIP",
m1:"Features",m2:"Packages",m3:"Contact",
footer:"© 2026 Game Hub Cyber Ultra"
},

hy:{
title:"Cyber Gaming Hub",
desc:"Ultra պրեմիում esports կենտրոն RTX համակարգերով",
btn:"Ամրագրել",
ftitle:"Հատկություններ",
ptitle:"Փաթեթներ",
f1:"RTX PC",
f2:"1Gb ինտերնետ",
f3:"Esports Arena",
f4:"24/7 հասանելիություն",
p1:"Բազային",p2:"Պրո",p3:"ՎԻՊ",
m1:"Հատկություններ",m2:"Փաթեթներ",m3:"Կապ",
footer:"© 2026 Game Hub"
},

ru:{
title:"Cyber Gaming Hub",
desc:"Ультра премиум киберспорт центр с RTX системами",
btn:"Бронь",
ftitle:"Функции",
ptitle:"Пакеты",
f1:"RTX ПК",
f2:"1Gb интернет",
f3:"Pro арена",
f4:"24/7 доступ",
p1:"Базовый",p2:"Про",p3:"ВИП",
m1:"Функции",m2:"Пакеты",m3:"Контакты",
footer:"© 2026 Game Hub"
}
};

function switchLang(){
i = (i+1)%3;
let L = langs[i];

document.getElementById("title").innerText = t[L].title;
document.getElementById("desc").innerText = t[L].desc;
document.getElementById("btn").innerText = t[L].btn;

document.getElementById("ftitle").innerText = t[L].ftitle;
document.getElementById("ptitle").innerText = t[L].ptitle;

document.getElementById("f1").innerText = t[L].f1;
document.getElementById("f2").innerText = t[L].f2;
document.getElementById("f3").innerText = t[L].f3;
document.getElementById("f4").innerText = t[L].f4;

document.getElementById("p1").innerText = t[L].p1;
document.getElementById("p2").innerText = t[L].p2;
document.getElementById("p3").innerText = t[L].p3;

document.getElementById("m1").innerText = t[L].m1;
document.getElementById("m2").innerText = t[L].m2;
document.getElementById("m3").innerText = t[L].m3;

document.getElementById("footer").innerText = t[L].footer;
}

</script>

</body>
</html>
