<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub | Premium Gaming Club</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050510;
  color: white;
}

/* ================= NAVBAR ================= */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(10,10,25,0.6);
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  z-index: 1000;
  border-bottom: 1px solid rgba(138, 43, 226, 0.2);
}

.logo {
  font-weight: bold;
  font-size: 18px;
  color: #a855f7;
  letter-spacing: 2px;
}

/* ================= MENU ================= */
nav {
  display: flex;
  gap: 18px;
  align-items: center;
}

nav a {
  color: #cbd5e1;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
  padding: 6px 10px;
  border-radius: 6px;
}

nav a:hover {
  background: rgba(168,85,247,0.2);
  color: #a855f7;
}

/* ================= LANGUAGE ================= */
.lang {
  display: flex;
  gap: 6px;
}

.lang button {
  background: #12122a;
  border: 1px solid #2a2a55;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

.lang button:hover {
  border-color: #3b82f6;
  color: #3b82f6;
}

/* ================= HERO ================= */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
  background: radial-gradient(circle at center, #1a1033, #050510);
}

.hero h1 {
  font-size: 60px;
  margin: 0;
  color: #a855f7;
  text-shadow: 0 0 25px rgba(168,85,247,0.4);
}

.hero p {
  max-width: 600px;
  opacity: 0.8;
  margin-top: 15px;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 28px;
  background: linear-gradient(135deg, #3b82f6, #a855f7);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
  font-weight: bold;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(168,85,247,0.5);
}

/* ================= SECTIONS ================= */
section {
  padding: 90px 20px;
  text-align: center;
}

/* ================= CARDS ================= */
.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

.card {
  background: rgba(18,18,42,0.8);
  border: 1px solid rgba(168,85,247,0.2);
  padding: 20px;
  border-radius: 12px;
  width: 200px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  border-color: #a855f7;
  box-shadow: 0 0 20px rgba(59,130,246,0.2);
}

/* ================= GALLERY ================= */
img {
  width: 250px;
  margin: 10px;
  border-radius: 12px;
  border: 1px solid rgba(168,85,247,0.2);
  transition: 0.3s;
}

img:hover {
  transform: scale(1.05);
}

/* ================= FOOTER ================= */
footer {
  text-align: center;
  padding: 30px;
  background: #0a0a18;
  opacity: 0.7;
  border-top: 1px solid rgba(168,85,247,0.2);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header>

  <div class="logo">🎮 GAME HUB</div>

  <!-- MENU -->
  <nav>
    <a href="#">Home</a>
    <a href="#features">Features</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- LANGUAGE -->
  <div class="lang">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('hy')">HY</button>
    <button onclick="setLang('ru')">RU</button>
  </div>

</header>

<!-- HERO -->
<section class="hero">
  <h1 id="title">Game Hub Premium Club</h1>
  <p id="desc">High-end gaming PCs, esports environment, and ultra-fast experience.</p>
  <button class="btn" id="btn" onclick="go()">Book Now</button>
</section>

<!-- FEATURES -->
<section id="features">
  <h2 id="ftitle" style="color:#a855f7;">Features</h2>

  <div class="cards">
    <div class="card" id="f1">RTX Gaming PCs</div>
    <div class="card" id="f2">1Gb Internet</div>
    <div class="card" id="f3">Esports Setup</div>
    <div class="card" id="f4">24/7 Gaming</div>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery">
  <h2 id="gtitle" style="color:#a855f7;">Gallery</h2>

  <img src="https://images.unsplash.com/photo-1587202372775-98927e12e8e4">
  <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f">
  <img src="https://images.unsplash.com/photo-1598550476439-6847785fcea6">
</section>

<!-- FOOTER -->
<footer id="footer">
  © 2026 Game Hub
</footer>

<script>
const texts = {
  en: {
    title: "Game Hub Premium Club",
    desc: "High-end gaming PCs, esports environment, and ultra-fast experience.",
    btn: "Book Now",
    ftitle: "Features",
    f1: "RTX Gaming PCs",
    f2: "1Gb Internet",
    f3: "Esports Setup",
    f4: "24/7 Gaming",
    gtitle: "Gallery",
    footer: "© 2026 Game Hub"
  },

  hy: {
    title: "Game Hub Պրեմիում Ակումբ",
    desc: "Հզոր խաղային համակարգիչներ, էսպորտ միջավայր և արագ ինտերնետ։",
    btn: "Ամրագրել",
    ftitle: "Հատկություններ",
    f1: "RTX խաղային PC-ներ",
    f2: "1Gb ինտերնետ",
    f3: "Esports setup",
    f4: "24/7 խաղ",
    gtitle: "Գալերիա",
    footer: "© 2026 Game Hub"
  },

  ru: {
    title: "Game Hub Премиум клуб",
    desc: "Мощные игровые ПК, киберспорт и сверхбыстрый интернет.",
    btn: "Забронировать",
    ftitle: "Функции",
    f1: "RTX игровые ПК",
    f2: "1Gb интернет",
    f3: "Киберспорт сетап",
    f4: "24/7 игры",
    gtitle: "Галерея",
    footer: "© 2026 Game Hub"
  }
};

function setLang(lang){
  document.getElementById("title").innerText = texts[lang].title;
  document.getElementById("desc").innerText = texts[lang].desc;
  document.getElementById("btn").innerText = texts[lang].btn;

  document.getElementById("ftitle").innerText = texts[lang].ftitle;
  document.getElementById("f1").innerText = texts[lang].f1;
  document.getElementById("f2").innerText = texts[lang].f2;
  document.getElementById("f3").innerText = texts[lang].f3;
  document.getElementById("f4").innerText = texts[lang].f4;

  document.getElementById("gtitle").innerText = texts[lang].gtitle;
  document.getElementById("footer").innerText = texts[lang].footer;
}

function go(){
  alert("Next step: connect booking page or Firebase");
}
</script>

</body>
</html>
