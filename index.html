<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub | Premium Gaming Club</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050507;
  color: white;
}

/* NAV */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(10,10,15,0.9);
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  z-index: 1000;
}

.logo {
  color: #00ff99;
  font-weight: bold;
}

/* MENU */
nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

nav a:hover {
  color: #00ff99;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
  background: radial-gradient(circle, #101020, #050507);
}

.hero h1 {
  font-size: 55px;
  color: #00ff99;
}

.hero p {
  opacity: 0.7;
  max-width: 600px;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: #00ff99;
  color: black;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* SECTIONS */
section {
  padding: 80px 20px;
  text-align: center;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

.card {
  background: #12121a;
  padding: 20px;
  border-radius: 10px;
  width: 200px;
}

/* GALLERY */
img {
  width: 250px;
  margin: 10px;
  border-radius: 10px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  background: #0a0a0f;
  opacity: 0.7;
}
</style>
</head>

<body>

<header>
  <div class="logo">🎮 GAME HUB</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Game Hub Premium Club</h1>
  <p>High-end gaming PCs, esports environment, and ultra-fast experience.</p>
  <button class="btn" onclick="go()">Book Now</button>
</section>

<!-- FEATURES -->
<section>
  <h2 style="color:#00ff99;">Features</h2>

  <div class="cards">
    <div class="card">RTX Gaming PCs</div>
    <div class="card">1Gb Internet</div>
    <div class="card">Esports Setup</div>
    <div class="card">24/7 Gaming</div>
  </div>
</section>

<!-- GALLERY -->
<section>
  <h2 style="color:#00ff99;">Gallery</h2>

  <img src="https://images.unsplash.com/photo-1587202372775-98927e12e8e4">
  <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f">
  <img src="https://images.unsplash.com/photo-1598550476439-6847785fcea6">
</section>

<footer>
  © 2026 Game Hub
</footer>

<script>
function go(){
  alert("Next step: connect booking page or Firebase");
}
</script>

</body>
</html>
