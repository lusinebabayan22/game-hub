<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub Computer Club</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0f;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: #111;
}

.logo {
  color: #00ff99;
  font-weight: bold;
}

.hero {
  text-align: center;
  padding: 40px 20px;
}

.hero h1 {
  color: #00ff99;
  font-size: 42px;
}

section {
  padding: 20px;
  text-align: center;
}

input, select, button {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  background: #00ff99;
  font-weight: bold;
  cursor: pointer;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

.pc {
  width: 110px;
  padding: 10px;
  border-radius: 10px;
  background: #222;
}

.free {
  border: 2px solid #00ff99;
}

.busy {
  border: 2px solid red;
}

.card {
  background: #151515;
  padding: 10px;
  margin: 8px;
  border-radius: 10px;
}

#qr {
  margin-top: 15px;
}

.admin {
  padding: 20px;
  background: #0f0f0f;
}
</style>
</head>

<body>

<header>
  <div class="logo">🎮 Game Hub</div>
</header>

<!-- MAIN APP -->
<section>

<h1 class="hero">Game Hub Booking System</h1>

<input id="name" placeholder="Your name">

<select id="pcSelect"></select>

<select id="timeSelect">
  <option>10:00-12:00</option>
  <option>12:00-14:00</option>
  <option>14:00-16:00</option>
  <option>16:00-18:00</option>
</select>

<button onclick="bookPC()">Book PC</button>

<div id="qr"></div>

<h2>Live PCs</h2>
<div class="grid" id="pcGrid"></div>

<h2>Bookings</h2>
<div id="list"></div>

</section>

<!-- ADMIN (NO LOGIN, ALWAYS VISIBLE) -->
<section class="admin">
  <h2>ADMIN PANEL</h2>
  <div id="adminList"></div>
</section>

<!-- QR LIB -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  onSnapshot,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const bookingsRef = collection(db, "bookings");

const pcs = Array.from({length:10},(_,i)=>`PC ${i+1}`);

/* ================= BOOK ================= */

window.bookPC = async function(){

  const name = document.getElementById("name").value;
  const pc = document.getElementById("pcSelect").value;
  const time = document.getElementById("timeSelect").value;

  if(!name) return alert("Enter name");

  const q = query(bookingsRef, where("pc","==",pc), where("time","==",time));
  const snap = await getDocs(q);

  if(!snap.empty){
    alert("❌ Already booked");
    return;
  }

  const docRef = await addDoc(bookingsRef,{
    name,
    pc,
    time,
    created: Date.now()
  });

  generateQR(docRef.id);
};

/* ================= QR ================= */

function generateQR(id){
  const qrDiv = document.getElementById("qr");
  qrDiv.innerHTML = "";

  QRCode.toCanvas(document.createElement("canvas"),
  "BOOKING:" + id,
  function (err, canvas) {
    qrDiv.appendChild(canvas);
  });
}

/* ================= LIVE SYNC ================= */

onSnapshot(bookingsRef,(snap)=>{

  const list = document.getElementById("list");
  const adminList = document.getElementById("adminList");
  const grid = document.getElementById("pcGrid");
  const select = document.getElementById("pcSelect");

  list.innerHTML = "";
  adminList.innerHTML = "";
  grid.innerHTML = "";
  select.innerHTML = "";

  let active = [];

  snap.forEach(d=>{
    let data = d.data();
    active.push(data);

    list.innerHTML += `
      <div class="card">
        ${data.name} | ${data.pc} | ${data.time}
      </div>
    `;

    adminList.innerHTML += `
      <div class="card">
        <b>${data.name}</b> - ${data.pc} - ${data.time}
        <br><button onclick="del('${d.id}')">Delete</button>
      </div>
    `;
  });

  pcs.forEach(pc=>{
    const busy = active.some(b=>b.pc===pc);

    grid.innerHTML += `
      <div class="pc ${busy?'busy':'free'}">${pc}</div>
    `;

    if(!busy){
      select.innerHTML += `<option>${pc}</option>`;
    }
  });

});

/* ================= DELETE ================= */

window.del = async function(id){
  await deleteDoc(doc(db,"bookings",id));
};

</script>

</body>
</html>
