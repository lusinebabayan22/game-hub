<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub Cyber Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050510;
  color: white;
  overflow-x: hidden;
}

/* PARTICLES */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  background: radial-gradient(circle at top, #120a2a, #050510);
}

.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #a855f7;
  border-radius: 50%;
  animation: float 8s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 1; }
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: rgba(10, 10, 25, 0.6);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(168,85,247,0.3);
  z-index: 1000;
}

.logo {
  color: #a855f7;
  font-weight: bold;
}

/* NAV */
nav {
  display: flex;
  gap: 15px;
}

nav a {
  color: #cbd5e1;
  text-decoration: none;
}

/* MENU */
.side-menu {
  position: fixed;
  top: 0;
  right: -280px;
  width: 280px;
  height: 100vh;
  background: #0b0b18;
  padding: 70px 20px;
  transition: 0.4s;
  z-index: 2000;
}

.side-menu.active { right: 0; }

.side-menu a {
  display: block;
  margin: 10px 0;
  padding: 10px;
  background: rgba(168,85,247,0.1);
  color: white;
  text-decoration: none;
  border-radius: 8px;
}

/* HAMBURGER */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
}

.hamburger div {
  width: 26px;
  height: 3px;
  background: #a855f7;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 60px;
  color: #a855f7;
  text-shadow: 0 0 20px #3b82f6;
}

.hero p {
  max-width: 600px;
  opacity: 0.8;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: linear-gradient(135deg, #3b82f6, #a855f7);
  border: none;
  color: white;
  border-radius: 10px;
}

/* SECTIONS */
section {
  padding: 90px 20px;
  text-align: center;
}

/* PACKAGES */
.packages {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 15px;
}

.package {
  width: 220px;
  padding: 20px;
  background: rgba(18,18,40,0.8);
  border: 1px solid rgba(168,85,247,0.3);
  border-radius: 12px;
}

.price {
  color: #3b82f6;
  font-size: 26px;
  margin: 10px 0;
}

/* STATS */
.stats {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 15px;
}

.stat {
  background: rgba(18,18,40,0.8);
  padding: 20px;
  border-radius: 10px;
  width: 160px;
}

/* CTA */
.cta {
  background: linear-gradient(135deg, #120a2a, #050510);
}

/* LANGUAGE BUTTON */
.lang-btn {
  background: linear-gradient(135deg, #3b82f6, #a855f7);
  border: none;
  color: white;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

/* MOBILE */
@media(max-width:768px){
  nav { display:none; }
  .hamburger { display:flex; }
}
</style>
</head>

<body>

<div id="particles"></div>

<header>
  <div class="logo">🎮 GAME HUB</div>

  <nav>
    <a href="#about" id="m1">About</a>
    <a href="#packages" id="m2">Packages</a>
    <a href="#stats" id="m3">Stats</a>
  </nav>

  <button class="lang-btn" onclick="switchLang()">EN</button>
</header>

<!-- HERO -->
<section class="hero">
  <h1 id="title">Cyber Gaming Hub</h1>
  <p id="desc">Next-gen esports center with ultra performance PCs.</p>
  <button class="btn" id="btn">Book Now</button>
</section>

<!-- ABOUT -->
<section id="about">
  <h2 id="aboutT" style="color:#a855f7;">About Us</h2>
  <p id="aboutD">Premium gaming club with RTX PCs and esports tournaments.</p>
</section>

<!-- STATS -->
<section id="stats">
  <h2 id="statsT" style="color:#a855f7;">Stats</h2>

  <div class="stats">
    <div class="stat" id="s1">50+ PCs</div>
    <div class="stat" id="s2">1Gb Internet</div>
    <div class="stat" id="s3">24/7 Open</div>
    <div class="stat" id="s4">1000+ Players</div>
  </div>
</section>

<!-- PACKAGES -->
<section id="packages">
  <h2 id="packT" style="color:#a855f7;">Packages</h2>

  <div class="packages">
    <div class="package">
      <h3 id="p1">Basic</h3>
      <div class="price">$5/hr</div>
    </div>

    <div class="package">
      <h3 id="p2">Pro</h3>
      <div class="price">$10/hr</div>
    </div>

    <div class="package">
      <h3 id="p3">VIP</h3>
      <div class="price">$20/hr</div>
    </div>
  </div>
</section>

<section class="cta">
  <h2 id="ctaT">Ready to play?</h2>
  <button class="btn" id="ctaB">Join Now</button>
</section>

<script>

/* PARTICLES */
const particles = document.getElementById("particles");
for(let i=0;i<50;i++){
  let p = document.createElement("div");
  p.classList.add("particle");
  p.style.left = Math.random()*100+"vw";
  p.style.animationDuration = (3+Math.random()*5)+"s";
  particles.appendChild(p);
}

/* LANGUAGES */
let i = 0;
const langs = ["en","hy","ru"];

const t = {
en:{
title:"Cyber Gaming Hub",desc:"Next-gen esports center with ultra PCs.",btn:"Book Now",
aboutT:"About Us",aboutD:"Premium gaming club with RTX PCs.",
statsT:"Stats",s1:"50+ PCs",s2:"1Gb Internet",s3:"24/7 Open",s4:"1000+ Players",
packT:"Packages",p1:"Basic",p2:"Pro",p3:"VIP",
ctaT:"Ready to play?",ctaB:"Join Now",
m1:"About",m2:"Packages",m3:"Stats"
},

hy:{
title:"Cyber Gaming Hub",desc:"Էսպորտ կենտրոն բարձրակարգ PC-ներով",btn:"Ամրագրել",
aboutT:"Մեր մասին",aboutD:"RTX համակարգիչներով gaming ակումբ",
statsT:"Վիճակագրություն",s1:"50+ PC",s2:"1Gb ինտերնետ",s3:"24/7 բաց",s4:"1000+ խաղացող",
packT:"Փաթեթներ",p1:"Բազային",p2:"Պրո",p3:"ՎԻՊ",
ctaT:"Պատրաստ ես?",ctaB:"Միացիր",
m1:"Մասին",m2:"Փաթեթներ",m3:"Վիճակ"
},

ru:{
title:"Cyber Gaming Hub",desc:"Киберспорт центр с мощными ПК",btn:"Бронь",
aboutT:"О нас",aboutD:"Игровой клуб с RTX ПК",
statsT:"Статистика",s1:"50+ ПК",s2:"1Gb интернет",s3:"24/7 открыт",s4:"1000+ игроков",
packT:"Пакеты",p1:"Базовый",p2:"Про",p3:"ВИП",
ctaT:"Готов играть?",ctaB:"Присоединиться",
m1:"О нас",m2:"Пакеты",m3:"Статистика"
}
};

function switchLang(){
i=(i+1)%3;
let L=langs[i];

document.getElementById("title").innerText=t[L].title;
document.getElementById("desc").innerText=t[L].desc;
document.getElementById("btn").innerText=t[L].btn;

document.getElementById("aboutT").innerText=t[L].aboutT;
document.getElementById("aboutD").innerText=t[L].aboutD;

document.getElementById("statsT").innerText=t[L].statsT;
document.getElementById("s1").innerText=t[L].s1;
document.getElementById("s2").innerText=t[L].s2;
document.getElementById("s3").innerText=t[L].s3;
document.getElementById("s4").innerText=t[L].s4;

document.getElementById("packT").innerText=t[L].packT;
document.getElementById("p1").innerText=t[L].p1;
document.getElementById("p2").innerText=t[L].p2;
document.getElementById("p3").innerText=t[L].p3;

document.getElementById("ctaT").innerText=t[L].ctaT;
document.getElementById("ctaB").innerText=t[L].ctaB;

document.getElementById("m1").innerText=t[L].m1;
document.getElementById("m2").innerText=t[L].m2;
document.getElementById("m3").innerText=t[L].m3;

document.querySelector(".lang-btn").innerText=L.toUpperCase();
}

</script>

</body>
</html>
